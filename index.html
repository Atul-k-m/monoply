<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmpireX - E-CELL BMSIT&M</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-green: #c8e6c9;
      --navy: #1d3557;
      --red: #e63946;
      --gold: #c9a84c;
      --cream: #fdf6e3;
    }
    body {
      background-color: var(--bg-green);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1, h2, h3, .monopoly-font {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
    }
    .screen {
      display: none;
      flex: 1;
      padding: 2rem;
      box-sizing: border-box;
      flex-direction: column;
    }
    .screen.active {
      display: flex;
    }
    /* Brand Header */
    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-header h1 {
      font-size: 4rem;
      color: var(--navy);
      text-shadow: 2px 2px 0 var(--gold);
      margin: 0;
    }
    .brand-header p {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--red);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Base Buttons */
    .action-btn {
      align-self: center;
      padding: 1rem 3rem;
      font-size: 2rem;
      background: var(--red);
      color: white;
      border: 4px solid var(--navy);
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      box-shadow: 0 0 15px var(--gold);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 2rem;
    }
    .action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px var(--gold);
    }
    .action-btn.secondary {
      background: var(--navy);
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* Screen 1 */
    .grid-20 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    .team-card {
      background: white;
      border: 4px solid black;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
      height: 120px;
      position: relative;
      background-color: var(--cream);
    }
    .card-color-bar {
      height: 35px;
      border-bottom: 4px solid black;
    }
    .card-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
      padding: 0.5rem;
    }

    /* Screen 2 */
    .groups-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
    .group-panel {
      background: var(--cream);
      border: 4px solid black;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .group-header {
      text-align: center;
      padding: 1rem;
      border-bottom: 4px solid black;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: white;
      -webkit-text-stroke: 1px black;
      letter-spacing: 1px;
    }
    .group-teams {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .s2-target-card {
      height: 60px;
      border: 2px solid black;
    }
    .s2-target-card .card-color-bar {
      height: 15px;
      border-bottom: 2px solid black;
    }
    .s2-target-card .card-content {
      font-size: 0.9rem;
    }

    /* Screen 3 */
    .round-header {
      text-align: center;
      font-size: 3rem;
      color: var(--navy);
      background: var(--gold);
      border: 6px solid black;
      padding: 1rem 3rem;
      border-radius: 12px;
      margin: 0 auto 2rem auto;
      display: inline-block;
      align-self: center;
    }
    .s3-groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .group-team-input {
      background: white;
      border: 2px solid black;
      padding: 0.5rem;
      text-align: center;
      font-weight: bold;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    .score-input {
      width: 100%;
      padding: 0.5rem;
      border: 2px solid var(--bg-green);
      border-radius: 4px;
      text-align: center;
      font-weight: bold;
      font-size: 1.2rem;
      box-sizing: border-box;
      margin-top: 0.5rem;
      background: #eef;
    }
    .score-input:focus {
      outline: none;
      border-color: var(--red);
    }
    .s3-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .history-section {
      max-width: 800px;
      margin: 2rem auto 0 auto;
      width: 100%;
      background: white;
      border: 4px solid black;
      border-radius: 8px;
    }
    .history-toggle {
      width: 100%;
      background: var(--navy);
      color: white;
      border: none;
      padding: 1rem;
      font-size: 1.2rem;
      font-family: 'Bebas Neue', sans-serif;
      cursor: pointer;
    }
    .history-content {
      padding: 1rem;
      display: none;
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
    }
    .history-table th, .history-table td {
      border: 2px solid black;
      padding: 0.5rem;
      text-align: center;
    }
    .history-table th {
      background: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
    }

    /* Screen 4 */
    .leaderboard-container {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      background: var(--cream);
      border: 8px solid black;
      border-radius: 16px;
      padding: 2rem;
      position: relative;
    }
    .lb-row {
      display: flex;
      align-items: center;
      border-bottom: 2px solid #ccc;
      padding: 1rem 0;
      position: relative;
    }
    .lb-row:last-child {
      border-bottom: none;
    }
    .lb-rank {
      width: 40px;
      height: 40px;
      background: var(--gold);
      color: black;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border-radius: 50%;
      margin-right: 1rem;
      font-size: 1.2rem;
    }
    .lb-team {
      flex: 1;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .lb-scores-summary {
      font-size: 1rem;
      color: #666;
      margin-right: 1rem;
    }
    .lb-score {
      font-size: 2.5rem;
      font-family: 'Bebas Neue', sans-serif;
      color: var(--navy);
    }
    .go-badge {
      position: absolute;
      top: -20px;
      right: -20px;
      background: var(--red);
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      padding: 1rem 1.5rem;
      border: 4px solid black;
      border-radius: 50%;
      transform: rotate(15deg);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    }

    /* Confetti */
    .confetti {
      position: fixed;
      top: -10px;
      width: 10px;
      height: 10px;
      z-index: 9999;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); }
    }
  </style>
</head>
<body>

  <!-- COMMON BRAND HEADER -->
  <div class="brand-header">
    <h1>EMPIREX</h1>
    <p>By E-CELL BMSIT&M</p>
  </div>

  <!-- SCREEN 1: LANDING & TEAMS -->
  <div id="screen-1" class="screen active">
    <!-- Will be populated by JS -->
    <div class="grid-20" id="s1-grid"></div>
    <button class="action-btn" onclick="doShuffle()" id="s1-start-btn">START SHUFFLE</button>
  </div>

  <!-- SCREEN 2: SHUFFLE & GROUPS -->
  <div id="screen-2" class="screen">
    <div class="groups-container" id="s2-groups"></div>
    <button class="action-btn" onclick="goToRoundTracker()" id="s2-next-btn" style="display:none;">BEGIN ROUND 1 ➔</button>
  </div>

  <!-- SCREEN 3: ROUND TRACKER -->
  <div id="screen-3" class="screen">
    <div class="round-header" id="round-title">ROUND 1</div>
    <div class="s3-groups-grid" id="s3-groups-grid"></div>
    
    <div class="s3-actions">
      <button class="action-btn secondary" onclick="handleNextRound()" id="next-round-btn">NEXT ROUND</button>
      <button class="action-btn" onclick="publishScores()">PUBLISH LEADERBOARD</button>
    </div>

    <div class="history-section">
      <button onclick="toggleHistory()" class="history-toggle">▼ ROUND HISTORY ▼</button>
      <div id="history-content" class="history-content"></div>
    </div>
  </div>

  <!-- SCREEN 4: LEADERBOARD -->
  <div id="screen-4" class="screen">
    <div class="leaderboard-container">
      <div class="brand-header"><h2 style="font-size:3rem; margin:0; text-shadow:none;">LEADERBOARD</h2></div>
      <div id="lb-list"></div>
    </div>
    <button class="action-btn" onclick="backToRounds()">BACK TO ROUNDS</button>
  </div>

  <script>
    const propertyPalette = ['#8B4513', '#87CEEB', '#FF69B4', '#FFA500', '#FF0000', '#FFD700', '#008000', '#000080', '#00ced1', '#ff1493'];
    const groupPalette = ['#8B4513', '#87CEEB', '#FF69B4', '#FFA500', '#FF0000'];
    const groupNames = ['Group A', 'Group B', 'Group C', 'Group D', 'Group E'];
    
    let currentRound = 1;
    let teamsData = [];
    
    for (let i = 1; i <= 20; i++) {
      teamsData.push({
        id: i,
        name: `Team ${i}`,
        color: propertyPalette[(i-1) % propertyPalette.length],
        groupIndex: null,
        scores: [],
        total: 0
      });
    }

    function initScreen1() {
      const grid = document.getElementById('s1-grid');
      grid.innerHTML = '';
      teamsData.forEach(team => {
        const d = document.createElement('div');
        d.className = 'team-card s1-card';
        d.id = `card-${team.id}`;
        d.innerHTML = `
          <div class="card-color-bar" style="background-color: ${team.color}"></div>
          <div class="card-content">${team.name}</div>
        `;
        grid.appendChild(d);
      });
    }

    async function doShuffle() {
      const s1 = document.getElementById('screen-1');
      const s2 = document.getElementById('screen-2');
      document.getElementById('s1-start-btn').style.display = 'none';

      let availableSlots = [];
      for(let g=0; g<5; g++) {
        for(let s=0; s<4; s++) availableSlots.push(g);
      }
      availableSlots.sort(() => Math.random() - 0.5);
      teamsData.forEach((t, idx) => {
        t.groupIndex = availableSlots[idx];
      });

      const cards = Array.from(document.querySelectorAll('.s1-card'));
      const rects = cards.map(c => c.getBoundingClientRect());
      
      const overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.top = '0'; overlay.style.left = '0';
      overlay.style.width = '100vw'; overlay.style.height = '100vh';
      overlay.style.zIndex = '1000';
      overlay.style.pointerEvents = 'none';
      document.body.appendChild(overlay);

      const clones = cards.map((c, i) => {
        const clone = c.cloneNode(true);
        clone.style.position = 'absolute';
        clone.style.left = rects[i].left + 'px';
        clone.style.top = rects[i].top + 'px';
        clone.style.width = rects[i].width + 'px';
        clone.style.height = rects[i].height + 'px';
        clone.style.margin = '0';
        clone.style.transition = 'all 0.5s ease-in-out';
        overlay.appendChild(clone);
        c.style.opacity = '0';
        return clone;
      });

      // Chaotic Shuffle Animation
      for(let step=0; step<4; step++) {
        clones.forEach(clone => {
          const rx = Math.random() * (window.innerWidth - 150);
          const ry = Math.random() * (window.innerHeight - 150);
          const rrot = (Math.random() - 0.5) * 360;
          clone.style.transform = `translate(${rx - parseFloat(clone.style.left)}px, ${ry - parseFloat(clone.style.top)}px) rotate(${rrot}deg) scale(1.1)`;
        });
        await new Promise(res => setTimeout(res, 500));
      }

      s1.classList.remove('active');
      s2.classList.add('active');
      renderGroupsForScreen2();
      
      s2.style.opacity = '0';
      await new Promise(res => setTimeout(res, 50));
      
      const targets = [];
      teamsData.forEach(t => {
        const tgt = document.getElementById(`s2-target-${t.id}`);
        targets[t.id] = tgt.getBoundingClientRect();
      });

      s2.style.opacity = '1';

      clones.forEach((clone, i) => {
        const team = teamsData[i];
        const tgt = targets[team.id];
        clone.style.transition = 'all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1)';
        clone.style.transform = `translate(${tgt.left - parseFloat(clone.style.left)}px, ${tgt.top - parseFloat(clone.style.top)}px) rotate(0deg) scale(1)`;
        clone.style.width = tgt.width + 'px';
        clone.style.height = tgt.height + 'px';
      });

      await new Promise(res => setTimeout(res, 850));
      document.body.removeChild(overlay);
      
      document.querySelectorAll('.s2-target-card').forEach(c => c.style.opacity = '1');
      document.getElementById('s2-next-btn').style.display = 'inline-block';
    }

    function renderGroupsForScreen2() {
      const container = document.getElementById('s2-groups');
      container.innerHTML = '';
      for(let g=0; g<5; g++) {
        const groupTeams = teamsData.filter(t => t.groupIndex === g);
        let html = `
          <div class="group-panel">
            <div class="group-header" style="background-color: ${groupPalette[g]}">${groupNames[g]}</div>
            <div class="group-teams">
        `;
        groupTeams.forEach(t => {
          html += `
            <div class="team-card s2-target-card" id="s2-target-${t.id}" style="opacity: 0;">
              <div class="card-color-bar" style="background-color: ${t.color}"></div>
              <div class="card-content">${t.name}</div>
            </div>
          `;
        });
        html += `</div></div>`;
        container.innerHTML += html;
      }
    }

    function goToRoundTracker() {
      document.getElementById('screen-2').classList.remove('active');
      document.getElementById('screen-3').classList.add('active');
      renderScreen3();
    }

    function renderScreen3() {
      document.getElementById('round-title').innerText = `ROUND ${currentRound}`;
      const grid = document.getElementById('s3-groups-grid');
      grid.innerHTML = '';
      
      for(let g=0; g<5; g++) {
        const groupTeams = teamsData.filter(t => t.groupIndex === g);
        let html = `
          <div class="group-panel">
            <div class="group-header" style="background-color: ${groupPalette[g]}">${groupNames[g]}</div>
            <div class="group-teams">
        `;
        groupTeams.forEach(t => {
          html += `
            <div class="group-team-input">
              <div style="font-size:0.9rem; margin-bottom:0.2rem;">${t.name}</div>
              <input type="number" class="score-input" id="score-${t.id}" placeholder="$">
            </div>
          `;
        });
        html += `</div></div>`;
        grid.innerHTML += html;
      }
      updateHistory();
    }

    function handleNextRound() {
      // save before next round
      teamsData.forEach(t => {
        const input = document.getElementById(`score-${t.id}`);
        if(input && input.value !== '') {
            t.scores[currentRound - 1] = parseInt(input.value) || 0;
        } else if(t.scores[currentRound - 1] === undefined) {
            t.scores[currentRound - 1] = 0;
        }
      });
      // recalc totals
      teamsData.forEach(t => t.total = t.scores.reduce((a,b)=>a+b, 0));
      
      currentRound++;
      document.getElementById('round-title').innerText = `ROUND ${currentRound}`;
      teamsData.forEach(t => {
        const input = document.getElementById(`score-${t.id}`);
        if(input) input.value = '';
      });
      updateHistory();
    }

    function publishScores() {
      teamsData.forEach(t => {
        const input = document.getElementById(`score-${t.id}`);
        if(input && input.value !== '') {
            t.scores[currentRound - 1] = parseInt(input.value) || 0;
        } else if(t.scores[currentRound - 1] === undefined) {
            t.scores[currentRound - 1] = 0;
        }
      });
      teamsData.forEach(t => t.total = t.scores.reduce((a,b)=>a+b, 0));
      
      document.getElementById('screen-3').classList.remove('active');
      document.getElementById('screen-4').classList.add('active');
      
      const sorted = [...teamsData].sort((a,b) => b.total - a.total);
      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      
      if(sorted.length > 0 && sorted[0].total > 0) {
          // ensure top team gets badge only if there is a positive score
      }
      
      sorted.forEach((t, i) => {
        let badge = (i === 0) ? '<div class="go-badge">GO</div>' : '';
        list.innerHTML += `
          <div class="lb-row">
            ${badge}
            <div class="lb-rank" style="background-color: ${t.color}">${i+1}</div>
            <div class="lb-team">${t.name} <span style="font-size:1rem; color:#666; font-family:'Inter'">(${groupNames[t.groupIndex]})</span></div>
            <div class="lb-scores-summary">Rounds: ${t.scores.join(', ')}</div>
            <div class="lb-score">$${t.total}</div>
          </div>
        `;
      });
      
      fireConfetti();
    }

    function backToRounds() {
      document.getElementById('screen-4').classList.remove('active');
      document.getElementById('screen-3').classList.add('active');
      document.querySelectorAll('.confetti').forEach(e => e.remove());
    }

    function toggleHistory() {
      const content = document.getElementById('history-content');
      content.style.display = content.style.display === 'none' || content.style.display === '' ? 'block' : 'none';
      if(content.style.display === 'block') {
         // Auto scroll
         content.scrollIntoView({behavior: "smooth"});
      }
    }

    function updateHistory() {
      const list = document.getElementById('history-content');
      if (currentRound <= 1) {
        list.innerHTML = '<p style="text-align:center;">No history yet. Complete a round first.</p>';
        return;
      }
      
      let html = '<table class="history-table"><tr><th>Team</th>';
      for(let r=1; r<currentRound; r++) html += `<th>R${r}</th>`;
      html += '<th>Total</th></tr>';

      teamsData.forEach(t => {
        html += `<tr><td><strong>${t.name}</strong></td>`;
        for(let r=1; r<currentRound; r++) {
          html += `<td>$${t.scores[r-1] ?? 0}</td>`;
        }
        let totalSoFar = t.scores.slice(0, currentRound-1).reduce((a,b)=>a+b, 0);
        html += `<td><strong>$${totalSoFar}</strong></td></tr>`;
      });
      html += '</table>';
      list.innerHTML = html;
    }

    function fireConfetti() {
      for (let i = 0; i < 150; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.backgroundColor = ['#e63946', '#1d3557', '#c9a84c', '#c8e6c9', '#ffffff'][Math.floor(Math.random() * 5)];
        conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
        conf.style.animationDelay = (Math.random() * 2) + 's';
        document.body.appendChild(conf);
      }
    }

    // Initialize
    initScreen1();
  </script>
</body>
</html>
