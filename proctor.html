<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EmpireX — Proctor</title>
    <style>
        @font-face {
            font-family: 'Glonto';
            src: url('Glonto-Regular.otf') format('opentype');
        }

        @font-face {
            font-family: 'Love Malia';
            src: url('Love Malia.ttf') format('truetype');
        }

        :root {
            --pink: #F49097;
            --lilac: #DFB2F4;
            --yellow: #F5E960;
            --ghost: #f9f8f6;
            --teal: #55D6C2;
            --black: #111111;
            --white: #ffffff;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Love Malia', sans-serif;
            background: var(--ghost);
            color: var(--black);
            min-height: 100vh;
            padding: 0.8rem;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1 {
            font-family: 'Glonto', sans-serif;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 0.2rem;
        }

        .sub {
            text-align: center;
            font-size: 0.85rem;
            color: var(--pink);
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        /* Timer */
        .timer-ctrl {
            background: var(--black);
            border: 4px solid var(--black);
            padding: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .timer-ctrl label {
            font-family: 'Glonto', sans-serif;
            color: var(--yellow);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .timer-display {
            font-family: 'Glonto', sans-serif;
            font-size: 1.8rem;
            color: var(--pink);
            font-variant-numeric: tabular-nums;
        }

        .timer-input {
            width: 55px;
            padding: 0.4rem;
            font-family: 'Glonto', sans-serif;
            font-size: 1rem;
            border: 3px solid var(--white);
            background: var(--white);
            color: var(--black);
            text-align: center;
        }

        .t-btn {
            font-family: 'Glonto', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.45rem 0.8rem;
            border: 3px solid var(--white);
            background: transparent;
            color: var(--white);
            cursor: pointer;
        }

        .t-btn:active {
            background: var(--teal);
            color: var(--black);
            border-color: var(--teal);
        }

        /* Round */
        .round-ctrl {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--yellow);
            border: 4px solid var(--black);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
        }

        .round-label {
            font-family: 'Glonto', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
        }

        .round-ctrl-btns {
            display: flex;
            gap: 0.4rem;
        }

        .r-btn {
            font-family: 'Glonto', sans-serif;
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            border: 3px solid var(--black);
            background: var(--white);
            color: var(--black);
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .r-btn:active {
            background: var(--black);
            color: var(--white);
        }

        /* Bracket */
        .bracket {
            background: var(--white);
            border: 4px solid var(--black);
            margin-bottom: 1rem;
        }

        .bracket-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.8rem;
            border-bottom: 4px solid var(--black);
        }

        .bracket-name {
            font-family: 'Glonto', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .pub-btn {
            font-family: 'Glonto', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.4rem 0.8rem;
            border: 3px solid var(--black);
            background: var(--teal);
            color: var(--black);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .pub-btn:active {
            transform: scale(0.95);
        }

        .pub-btn.done {
            background: var(--yellow);
        }

        .team-row {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.8rem;
            gap: 0.5rem;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
        }

        .team-row:last-child {
            border-bottom: none;
        }

        .team-dot {
            width: 10px;
            height: 10px;
            border: 2px solid var(--black);
            flex-shrink: 0;
        }

        .team-name {
            flex: 1;
            font-family: 'Glonto', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .score-input {
            width: 60px;
            padding: 0.35rem;
            font-family: 'Glonto', sans-serif;
            font-size: 1rem;
            border: 3px solid var(--black);
            background: var(--ghost);
            color: var(--black);
            text-align: center;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--teal);
            background: var(--white);
        }

        /* Status toast */
        .toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--black);
            color: var(--teal);
            font-family: 'Glonto', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            padding: 0.6rem 1.5rem;
            border: 3px solid var(--teal);
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <h1>EMPIREX</h1>
    <p class="sub">PROCTOR PANEL</p>

    <!-- Brackets -->
    <div id="brackets"></div>

    <!-- Toast -->
    <div class="toast" id="toast">✓ PUBLISHED</div>

    <script>
        const SK = 'empirex_data';
        const BRACKET_COLORS = ['#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#f9f8f6'];
        const BRACKET_NAMES = ['Bracket A', 'Bracket B', 'Bracket C', 'Bracket D', 'Bracket E'];

        let teams = [];

        function loadTeams() {
            try {
                const d = JSON.parse(localStorage.getItem(SK));
                if (d && d.teams) { teams = d.teams; return; }
            } catch (e) { }
            const cols = ['#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2'];
            teams = [];
            for (let i = 1; i <= 20; i++) {
                teams.push({ id: i, name: `Team ${i}`, color: cols[i - 1], group: Math.floor((i - 1) / 4), scores: [], total: 0 });
            }
        }

        function renderBrackets() {
            const container = document.getElementById('brackets');
            container.innerHTML = '';
            for (let g = 0; g < 5; g++) {
                const gt = teams.filter(t => t.group === g);
                const div = document.createElement('div');
                div.className = 'bracket';
                div.innerHTML = `
          <div class="bracket-head" style="background:${BRACKET_COLORS[g]}">
            <span class="bracket-name">${BRACKET_NAMES[g]}</span>
            <button class="pub-btn" data-group="${g}">PUBLISH</button>
          </div>
          ${gt.map(t => `
            <div class="team-row">
              <span class="team-dot" style="background:${t.color}"></span>
              <span class="team-name">${t.name}</span>
              <input type="number" class="score-input" id="inp-${t.id}" value="${t.total || ''}" placeholder="—" inputmode="numeric">
            </div>
          `).join('')}
        `;
                container.appendChild(div);
            }

            document.querySelectorAll('.pub-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const g = parseInt(btn.dataset.group);
                    publishBracket(g);
                    btn.classList.add('done');
                    btn.textContent = '✓ DONE';
                    setTimeout(() => { btn.classList.remove('done'); btn.textContent = 'PUBLISH'; }, 1500);
                    showToast();
                });
            });
        }

        function publishBracket(groupIdx) {
            const gt = teams.filter(t => t.group === groupIdx);
            gt.forEach(t => {
                const inp = document.getElementById(`inp-${t.id}`);
                if (inp && inp.value !== '') {
                    t.total = parseInt(inp.value) || 0;
                }
            });
            writeStorage();
        }

        function writeStorage() {
            const data = { teams, bracketNames: BRACKET_NAMES, bracketColors: BRACKET_COLORS };
            localStorage.setItem(SK, JSON.stringify(data));
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        // Init
        loadTeams();
        renderBrackets();
    </script>
</body>

</html>
