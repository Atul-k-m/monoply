<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EmpireX — Proctor</title>
    <style>
        @font-face {
            font-family: 'Glonto';
            src: url('Glonto-Regular.otf') format('opentype');
        }

        @font-face {
            font-family: 'Love Malia';
            src: url('Love Malia.ttf') format('truetype');
        }

        :root {
            --pink: #F49097;
            --lilac: #DFB2F4;
            --yellow: #F5E960;
            --ghost: #f9f8f6;
            --teal: #55D6C2;
            --black: #111111;
            --white: #fff;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Love Malia', sans-serif;
            background: var(--ghost);
            color: var(--black);
            min-height: 100vh;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1 {
            font-family: 'Glonto', sans-serif;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 0.2rem;
        }

        .sub {
            text-align: center;
            font-family: 'Glonto', sans-serif;
            font-size: 1.2rem;
            color: var(--black);
            letter-spacing: 4px;
            margin-top: -0.2rem;
            margin-bottom: 1.5rem;
        }

        /* Login */
        .login-box {
            background: var(--white);
            border: 4px solid var(--black);
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .login-box.hidden {
            display: none;
        }

        .login-heading {
            font-family: 'Glonto', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 0.7rem;
            font-family: 'Glonto', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            border: 3px solid var(--black);
            background: var(--ghost);
            color: var(--black);
        }

        .login-input:focus {
            outline: none;
            border-color: var(--teal);
        }

        .login-input[type="password"] {
            text-transform: none;
        }

        .login-btn {
            font-family: 'Glonto', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 0.8rem;
            border: 4px solid var(--black);
            background: var(--teal);
            color: var(--black);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-error {
            font-family: 'Glonto', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--pink);
            text-align: center;
            min-height: 1em;
        }

        /* Panel content */
        .panel {
            display: none;
            width: 100%;
            max-width: 600px;
        }

        .panel.active {
            display: block;
        }

        .status-bar {
            text-align: center;
            padding: 0.5rem;
            font-family: 'Glonto', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            border: 3px solid var(--black);
        }

        .status-bar.ok {
            background: var(--teal);
        }

        .status-bar.err {
            background: var(--pink);
        }

        .bracket {
            background: var(--white);
            border: 4px solid var(--black);
            margin-bottom: 1rem;
        }

        .bracket-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.8rem;
            border-bottom: 4px solid var(--black);
        }

        .bracket-name {
            font-family: 'Glonto', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .pub-btn {
            font-family: 'Glonto', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.4rem 0.8rem;
            border: 3px solid var(--black);
            background: var(--teal);
            color: var(--black);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .pub-btn:active {
            transform: scale(0.95);
        }

        .pub-btn.done {
            background: var(--yellow);
        }

        .team-row {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.8rem;
            gap: 0.5rem;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
        }

        .team-row:last-child {
            border-bottom: none;
        }

        .team-dot {
            width: 10px;
            height: 10px;
            border: 2px solid var(--black);
            flex-shrink: 0;
        }

        .team-name {
            flex: 1;
            font-family: 'Glonto', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .score-input {
            width: 60px;
            padding: 0.35rem;
            font-family: 'Glonto', sans-serif;
            font-size: 1rem;
            border: 3px solid var(--black);
            background: var(--ghost);
            color: var(--black);
            text-align: center;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--teal);
            background: var(--white);
        }

        .toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--black);
            color: var(--teal);
            font-family: 'Glonto', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            padding: 0.6rem 1.5rem;
            border: 3px solid var(--teal);
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <h1>EMPIREX</h1>
    <p class="sub">PROCTOR PANEL</p>

    <!-- Login -->
    <div class="login-box" id="login-box">
        <h2 class="login-heading">ROOM ACCESS</h2>
        <input type="text" class="login-input" id="login-room" placeholder="ROOM CODE" maxlength="6" autocomplete="off">
        <input type="password" class="login-input" id="login-pass" placeholder="PASSWORD" autocomplete="off">
        <button class="login-btn" id="btn-login">ENTER</button>
        <p class="login-error" id="login-error"></p>
    </div>

    <!-- Score Panel (hidden until login) -->
    <div class="panel" id="panel">
        <div class="status-bar" id="status-bar">CONNECTING...</div>
        <div id="brackets"></div>
    </div>

    <div class="toast" id="toast">✓ PUBLISHED</div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const BRACKET_COLORS = ['#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#f9f8f6'];
        const BRACKET_NAMES = ['Bracket A', 'Bracket B', 'Bracket C', 'Bracket D', 'Bracket E'];
        const PASSWORD = 'e-cell';

        let teams = [];
        let db = null;
        let roomId = null;

        /* ── Firebase ── */
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();

        /* ── Login ── */
        document.getElementById('btn-login').addEventListener('click', attemptLogin);
        document.getElementById('login-pass').addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });

        function attemptLogin() {
            const code = document.getElementById('login-room').value.trim().toUpperCase();
            const pass = document.getElementById('login-pass').value;
            const err = document.getElementById('login-error');

            if (!code) { err.textContent = 'ENTER ROOM CODE'; return; }
            if (pass !== PASSWORD) { err.textContent = 'WRONG PASSWORD'; return; }

            // Check room exists in Firebase
            db.ref(`empirex/rooms/${code}`).once('value', (snap) => {
                if (!snap.exists()) {
                    err.textContent = 'ROOM NOT FOUND';
                    return;
                }

                roomId = code;
                err.textContent = '';
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('panel').classList.add('active');

                // Connection status
                db.ref('.info/connected').on('value', (s) => {
                    const bar = document.getElementById('status-bar');
                    if (s.val()) {
                        bar.textContent = `● CONNECTED — ROOM: ${roomId}`;
                        bar.className = 'status-bar ok';
                    } else {
                        bar.textContent = '● OFFLINE';
                        bar.className = 'status-bar err';
                    }
                });

                loadTeams();
            });
        }

        /* ── Load teams from Firebase ── */
        function loadTeams() {
            db.ref(`empirex/rooms/${roomId}/teams`).once('value', (snap) => {
                const data = snap.val();
                if (data) {
                    teams = Object.values(data).sort((a, b) => a.id - b.id);
                } else {
                    const cols = ['#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2', '#F49097', '#DFB2F4', '#F5E960', '#55D6C2'];
                    teams = [];
                    for (let i = 1; i <= 20; i++) {
                        teams.push({ id: i, name: `Team ${i}`, color: cols[i - 1], group: Math.floor((i - 1) / 4), total: 0 });
                    }
                }
                renderBrackets();
            });
        }

        /* ── Render ── */
        function renderBrackets() {
            const container = document.getElementById('brackets');
            container.innerHTML = '';
            for (let g = 0; g < 5; g++) {
                const gt = teams.filter(t => t.group === g);
                if (gt.length === 0) continue;
                const div = document.createElement('div');
                div.className = 'bracket';
                div.innerHTML = `
          <div class="bracket-head" style="background:${BRACKET_COLORS[g]}">
            <span class="bracket-name">${BRACKET_NAMES[g]}</span>
            <button class="pub-btn" data-group="${g}">PUBLISH</button>
          </div>
          ${gt.map(t => `
            <div class="team-row">
              <span class="team-dot" style="background:${t.color}"></span>
              <span class="team-name">${t.name}</span>
              <input type="number" class="score-input" id="inp-${t.id}" value="${t.total || ''}" placeholder="—" inputmode="numeric">
            </div>
          `).join('')}
        `;
                container.appendChild(div);
            }

            document.querySelectorAll('.pub-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    publishBracket(parseInt(btn.dataset.group));
                    btn.classList.add('done');
                    btn.textContent = '✓ DONE';
                    setTimeout(() => { btn.classList.remove('done'); btn.textContent = 'PUBLISH'; }, 1500);
                    showToast();
                });
            });
        }

        /* ── Publish to Firebase ── */
        function publishBracket(groupIdx) {
            const gt = teams.filter(t => t.group === groupIdx);
            const updates = {};
            gt.forEach(t => {
                const inp = document.getElementById(`inp-${t.id}`);
                if (inp && inp.value !== '') {
                    t.total = parseInt(inp.value) || 0;
                }
                updates[`empirex/rooms/${roomId}/teams/team_${t.id}/total`] = t.total;
            });
            db.ref().update(updates);
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }
    </script>
</body>

</html>
